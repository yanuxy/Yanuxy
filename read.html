<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membaca Novel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="reader-mode">
    <header>
        <nav>
            <div class="container">
                <h1 id="novel-title">Memuat Judul...</h1>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="index.html#chapters">Daftar Bab</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="reader-controls">
            <button id="prev-chapter" class="btn"><i class="fas fa-arrow-left"></i> Sebelumnya</button>
            <select id="chapter-select">
                <option value="">Pilih Bab</option>
            </select>
            <button id="next-chapter" class="btn">Selanjutnya <i class="fas fa-arrow-right"></i></button>
        </div>

        <article id="chapter-content">
            <h2 id="chapter-title">Memuat Bab...</h2>
            <div id="chapter-text">
                <p>Memuat isi bab...</p>
            </div>
        </article>

        <div class="reader-controls bottom">
            <button id="prev-chapter-bottom" class="btn"><i class="fas fa-arrow-left"></i> Sebelumnya</button>
            <button id="next-chapter-bottom" class="btn">Selanjutnya <i class="fas fa-arrow-right"></i></button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 <span id="footer-author">Penulis</span>. Dibuat dengan ❤️ untuk pembaca.</p>
        </div>
    </footer>

    <script src="assets/js/reader.js"></script>
</body>
</html>
