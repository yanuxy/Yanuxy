<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Yanuxy</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --accent: #3498db;
            --text: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 0; 
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        header { text-align: center; padding: 40px 20px; border-bottom: 1px solid #222; }

        /* --- GRID SISTEM --- */
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        /* --- 1. HALAMAN UTAMA: KOTAK KATEGORI (3 BAGIAN) --- */
        .cat-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333;
            display: flex; flex-direction: column;
        }
        .cat-top { padding: 20px; text-align: center; font-weight: bold; font-size: 1.4rem; }
        .cat-mid img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .cat-bot { padding: 0; }

        /* --- 2. HALAMAN KATEGORI: KOTAK BUKU (3 BAGIAN) --- */
        .book-card { 
            background: #222; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #444;
            display: flex; flex-direction: column;
        }
        .book-top img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .book-mid { padding: 20px; text-align: center; flex-grow: 1; }
        .book-mid h3 { margin: 0; font-size: 1.2rem; }
        .book-bot { padding: 0; }

        /* TOMBOL BIRU */
        .btn-blue {
            display: block; width: 100%; padding: 15px;
            background: var(--accent); color: white; border: none;
            font-weight: bold; text-decoration: none; text-align: center;
            font-size: 1rem; cursor: pointer;
        }

        /* --- 3. HALAMAN ISI BUKU --- */
        #view-isi { 
            display: none; 
            background: #000; 
            min-height: 100vh; 
            padding: 40px 20px;
        }
        .isi-konten { 
            max-width: 800px; margin: auto; 
            color: #fff; line-height: 1.8; font-size: 1.1rem; 
        }

        .btn-back { 
            background: #333; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; 
        }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>Perpustakaan Yanuxy</h1>
</header>

<div class="container">
    <div id="view-utama" class="grid-layout"></div>

    <div id="view-kategori" style="display: none;">
        <button class="btn-back" onclick="showUtama()">← Kembali</button>
        <h2 id="judul-kat-aktif"></h2>
        <div id="grid-buku" class="grid-layout"></div>
    </div>

    <div id="view-isi">
        <button class="btn-back" onclick="backToKategori()">← Kembali ke Daftar</button>
        <div class="isi-konten">
            <h1 id="judul-buku-baca"></h1>
            <hr border="1" color="#333">
            <div id="teks-buku">
                </div>
        </div>
    </div>
</div>

<footer>© 2026 Yanuxy</footer>

<script>
    const data = [
        { 
            kategori: "Novel", 
            gambar: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1000", 
            buku: [
                { judul: "Universal Wealth System", sampul: "https://via.placeholder.com/300x400/111/fff?text=UWS", isi: "Ini adalah isi dari novel Universal Wealth System... (Teks Putih Background Hitam)" },
                { judul: "Sang Penyihir Terakhir", sampul: "https://via.placeholder.com/300x400/111/fff?text=Penyihir", isi: "Dahulu kala, hiduplah seorang penyihir... (Teks Putih Background Hitam)" }
            ]
        },
        { 
            kategori: "Programming", 
            gambar: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1000", 
            buku: [
                { judul: "Tutorial Modding", sampul: "https://via.placeholder.com/300x400/111/fff?text=Modding", isi: "Langkah-langkah melakukan modding hardware... (Teks Putih Background Hitam)" }
            ]
        }
    ];

    let katSekarang = null;

    // 1. Render Halaman Utama
    function showUtama() {
        document.getElementById('view-utama').style.display = 'grid';
        document.getElementById('view-kategori').style.display = 'none';
        document.getElementById('view-isi').style.display = 'none';
        
        const grid = document.getElementById('view-utama');
        grid.innerHTML = '';
        data.forEach((d, i) => {
            grid.innerHTML += `
                <div class="cat-card">
                    <div class="cat-top">${d.kategori}</div>
                    <div class="cat-mid"><img src="${d.gambar}"></div>
                    <div class="cat-bot"><button class="btn-blue" onclick="showKategori(${i})">Jelajahi</button></div>
                </div>
            `;
        });
    }

    // 2. Render Halaman Kategori (Daftar Buku)
    function showKategori(idx) {
        katSekarang = idx;
        const d = data[idx];
        document.getElementById('view-utama').style.display = 'none';
        document.getElementById('view-kategori').style.display = 'block';
        document.getElementById('judul-kat-aktif').innerText = d.kategori;

        const grid = document.getElementById('grid-buku');
        grid.innerHTML = '';
        d.buku.forEach((b, bi) => {
            grid.innerHTML += `
                <div class="book-card">
                    <div class="book-top"><img src="${b.sampul}"></div>
                    <div class="book-mid"><h3>${b.judul}</h3></div>
                    <div class="book-bot"><button class="btn-blue" onclick="bacaBuku(${idx}, ${bi})">Buka</button></div>
                </div>
            `;
        });
    }

    // 3. Render Halaman Isi Buku
    function bacaBuku(ki, bi) {
        const buku = data[ki].buku[bi];
        document.getElementById('view-kategori').style.display = 'none';
        document.getElementById('view-isi').style.display = 'block';
        document.getElementById('judul-buku-baca').innerText = buku.judul;
        document.getElementById('teks-buku').innerText = buku.isi;
        window.scrollTo(0,0);
    }

    function backToKategori() {
        document.getElementById('view-isi').style.display = 'none';
        document.getElementById('view-kategori').style.display = 'block';
    }

    showUtama();
</script>

</body>
</html>
