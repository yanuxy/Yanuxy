<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanuxy Library | Original Novels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0d11;
            --card-bg: #161b22;
            --accent: #3498db;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            padding: 60px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, transparent);
        }

        h1 { font-size: 2.5rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Social Links */
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .social-links a {
            color: var(--text-dim); text-decoration: none; font-size: 1.2rem;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #30363d; border-radius: 50%; transition: 0.3s; background: rgba(255,255,255,0.05);
        }
        .social-links a:hover { transform: translateY(-5px); border-color: var(--accent); color: var(--accent); }
        .social-links .yt:hover { color: #ff0000; border-color: #ff0000; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            border: 1px solid #30363d; transition: 0.3s; position: relative; 
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 230px; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 12px; text-align: center; font-size: 0.85rem; font-weight: 600; }
        .btn { 
            width: 100%; padding: 10px; background: var(--accent); color: white; 
            border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem;
        }

        /* Views */
        #view-cat, #view-read { display: none; }
        .content { 
            background: #0d1117; padding: 40px; border-radius: 15px; font-size: 1.15rem; 
            color: #d1d5db; line-height: 2; white-space: pre-wrap; border: 1px solid #21262d; margin-top: 20px;
        }
        .back-btn { 
            background: transparent; color: var(--text-dim); border: 1px solid #30363d; 
            padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .back-btn:hover { color: white; border-color: white; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .content { padding: 20px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>YANUXY LIBRARY</h1>
    <div class="social-links">
        <a href="https://www.youtube.com/@yanuxy" class="yt" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://facebook.com/PROFIL_ANDA" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://duendekomik.github.io" target="_blank"><i class="fas fa-globe"></i></a>
        <a href="mailto:emailanda@gmail.com"><i class="fas fa-envelope"></i></a>
    </div>
</header>

<div class="container">
    <div id="view-main">
        <div id="main-grid" class="grid"></div>
    </div>

    <div id="view-cat">
        <button class="back-btn" onclick="showMain()">← KEMBALI</button>
        <h2 id="cat-title"></h2>
        <div id="cat-grid" class="grid"></div>
    </div>

    <div id="view-read">
        <button class="back-btn" onclick="showCat()">← DAFTAR BUKU</button>
        <h2 id="read-title" style="color: var(--accent); margin-bottom: 5px;"></h2>
        <div id="read-content" class="content">Memuat naskah...</div>
    </div>
</div>

<script src="kategori/list-kategori.js"></script>
<script>
    function renderMain() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = allCategories.map((c, i) => `
            <div class="card">
                <img src="${c.img}">
                <div class="card-info">${c.nama}</div>
                <button class="btn" onclick="openCat(${i})">Buka Kategori</button>
            </div>
        `).join('');
    }

    let curIdx = 0;
    function openCat(i) {
        curIdx = i;
        document.getElementById('view-main').style.display = 'none';
        document.getElementById('view-cat').style.display = 'block';
        document.getElementById('cat-title').innerText = allCategories[i].nama;
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = allCategories[i].books.map(b => `
            <div class="card">
                <img src="${b.sampul}">
                <div class="card-info">${b.judul}</div>
                <button class="btn" onclick="loadBook('${b.file}', '${b.judul}')">Baca</button>
            </div>
        `).join('');
        window.scrollTo(0,0);
    }

    function loadBook(file, title) {
        document.getElementById('view-cat').style.display = 'none';
        document.getElementById('view-read').style.display = 'block';
        document.getElementById('read-title').innerText = title;
        document.getElementById('read-content').innerText = "Sedang memanggil naskah...";
        
        const s = document.createElement('script');
        s.src = `buku/${file}`;
        s.onload = () => { document.getElementById('read-content').innerText = window.currentBookContent; };
        document.body.appendChild(s);
        window.scrollTo(0,0);
    }

    function showMain() { document.getElementById('view-main').style.display='block'; document.getElementById('view-cat').style.display='none'; }
    function showCat() { document.getElementById('view-read').style.display='none'; document.getElementById('view-cat').style.display='block'; }
    renderMain();
</script>
</body>
</html>
