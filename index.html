<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanuxy Library | Original Novels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0d11;
            --card-bg: #161b22;
            --accent: #3498db;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Memastikan footer tetap di bawah */
        }

        header {
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, transparent);
        }

        h1 { font-size: 2.5rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; flex: 1; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #30363d; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .card-header {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #30363d;
            color: var(--accent);
        }

        .card-body img { width: 100%; height: 250px; object-fit: cover; filter: brightness(0.7); transition: 0.3s; }
        .card:hover img { filter: brightness(1); }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.03); }

        .btn-explore { 
            width: 100%; padding: 12px; background: var(--accent); color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; font-size: 0.85rem;
        }

        /* Reader View */
        #view-cat, #view-read { display: none; }
        .content { 
            background: #0d1117; padding: 40px; border-radius: 15px; font-size: 1.15rem; 
            color: #d1d5db; line-height: 2; white-space: pre-wrap; border: 1px solid #21262d; margin-top: 20px;
        }

        /* Footer & Social Links (Pindah ke Dasar) */
        footer {
            background-color: #0d1117;
            padding: 40px 20px;
            border-top: 1px solid #30363d;
            text-align: center;
            margin-top: 50px;
        }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-links a {
            color: var(--text-dim); text-decoration: none; font-size: 1.5rem;
            transition: 0.3s;
        }
        .social-links a:hover { transform: scale(1.2); color: var(--accent); }
        .social-links .yt:hover { color: #ff0000; }
        .social-links .fb:hover { color: #1877f2; }

        .copyright { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card img { height: 180px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>YANUXY</h1>
</header>

<div class="container">
    <div id="view-main">
        <div id="main-grid" class="grid"></div>
    </div>

    <div id="view-cat">
        <button style="background:transparent; color:var(--text-dim); border:1px solid #333; padding:8px 20px; border-radius:20px; cursor:pointer;" onclick="showMain()">← KEMBALI</button>
        <h2 id="cat-title" style="margin-top:20px; color:var(--accent);"></h2>
        <div id="cat-grid" class="grid"></div>
    </div>

    <div id="view-read">
        <button style="background:transparent; color:var(--text-dim); border:1px solid #333; padding:8px 20px; border-radius:20px; cursor:pointer;" onclick="showCat()">← DAFTAR BUKU</button>
        <h2 id="read-title" style="color: var(--accent); margin-top:20px;"></h2>
        <div id="read-content" class="content">Memuat...</div>
    </div>
</div>

<footer>
    <div class="social-links">
        <a href="https://www.youtube.com/@Yanuxynovel" class="yt" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.facebook.com/qian.jayadharma" class="fb" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://yanuxy.github.io/tasripan/" target="_blank"><i class="fas fa-globe"></i></a>
        <a href="mailto: qianjayadharma@gmail.com"><i class="fas fa-envelope"></i></a>
    </div>
    <div class="copyright">
        &copy; 2018 YANUXY LIBRARY. All Rights Reserved.
    </div>
</footer>

<script src="kategori/list-kategori.js"></script>
<script>
    function renderMain() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = allCategories.map((c, i) => `
            <div class="card">
                <div class="card-header">${c.nama}</div>
                <div class="card-body"><img src="${c.img}"></div>
                <div class="card-footer">
                    <button class="btn-explore" onclick="openCat(${i})">Jelajahi</button>
                </div>
            </div>
        `).join('');
    }

    function openCat(i) {
        document.getElementById('view-main').style.display = 'none';
        document.getElementById('view-cat').style.display = 'block';
        document.getElementById('cat-title').innerText = allCategories[i].nama;
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = allCategories[i].books.map(b => `
            <div class="card">
                <div class="card-body"><img src="${b.sampul}"></div>
                <div style="padding:10px; text-align:center; font-size:0.8rem; font-weight:bold;">${b.judul}</div>
                <div class="card-footer">
                    <button class="btn-explore" onclick="loadBook('${b.file}', '${b.judul}')">Baca</button>
                </div>
            </div>
        `).join('');
        window.scrollTo(0,0);
    }

    function loadBook(file, title) {
        document.getElementById('view-cat').style.display = 'none';
        document.getElementById('view-read').style.display = 'block';
        document.getElementById('read-title').innerText = title;
        document.getElementById('read-content').innerText = "Sedang memanggil naskah...";
        const s = document.createElement('script');
        s.src = `buku/${file}`;
        s.onload = () => { document.getElementById('read-content').innerText = window.currentBookContent; };
        document.body.appendChild(s);
        window.scrollTo(0,0);
    }

    function showMain() { document.getElementById('view-main').style.display='block'; document.getElementById('view-cat').style.display='none'; }
    function showCat() { document.getElementById('view-read').style.display='none'; document.getElementById('view-cat').style.display='block'; }
    
    renderMain();
</script>
</body>
</html>
