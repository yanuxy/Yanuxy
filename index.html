<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Digital Yanuxy</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #3498db;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 0; 
            color: var(--text-main); 
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        header { 
            background: var(--primary); 
            color: white; padding: 60px 20px; text-align: center; 
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* HALAMAN UTAMA: GRID KOTAK */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .book-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .book-card:hover { transform: translateY(-10px); }

        .card-header { padding: 25px 20px 15px 20px; }
        .card-header h2 { margin: 0; font-size: 1.6rem; color: #fff; }

        .card-image-main img {
            width: 100%; height: 160px; object-fit: cover; display: block;
            border-top: 1px solid #333; border-bottom: 1px solid #333;
        }

        .btn-action {
            display: block; width: 100%; padding: 18px;
            background: var(--accent); color: white; border: none;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        /* HALAMAN LIST (SETELAH KLIK JELAJAHI) */
        #halaman-list { 
            display: none; 
            max-width: 800px; 
            margin: 0 auto; 
            background-color: #000;
            min-height: 100vh;
        }
        
        .list-container {
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .list-header { 
            padding: 30px; 
            text-align: center; 
            border-bottom: 1px solid #333; 
        }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            border-bottom: 1px solid #222; 
        }
        .list-item:last-child { border-bottom: none; }
        
        .btn-download {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-back { 
            background: #333; color: white; padding: 12px 24px; 
            border: 1px solid #444; border-radius: 8px; cursor: pointer; margin-bottom: 25px; 
        }

        footer { text-align: center; padding: 60px 20px; color: #888; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>Perpustakaan Digital Yanuxy</h1>
    <p>Koleksi Ebook & Novel Terpilih</p>
</header>

<div class="container">
    <div id="halaman-utama" class="book-grid"></div>
    <div id="halaman-list"></div>
</div>

<footer>
    <p>© 2026 Perpustakaan Yanuxy</p>
</footer>

<script>
    const dataPerpustakaan = [
        { 
            nama: "Novel", 
            gambar: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1000", 
            buku: [
                { judul: "Universal Wealth System", link: "#" },
                { judul: "Sang Penyihir Terakhir", link: "#" },
                { judul: "Pedang di Balik Senyum", link: "#" }
            ]
        },
        { 
            nama: "Programming", 
            gambar: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1000", 
            buku: [
                { judul: "Hardware Modding Guide", link: "#" },
                { judul: "Belajar JavaScript Dasar", link: "#" }
            ]
        },
        { 
            nama: "Finansial", 
            gambar: "https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=1000", 
            buku: [
                { judul: "Investasi untuk Pemula", link: "#" }
            ]
        }
    ];

    function renderUtama() {
        const container = document.getElementById('halaman-utama');
        container.innerHTML = '';
        dataPerpustakaan.forEach((kat, index) => {
            container.innerHTML += `
                <div class="book-card">
                    <div class="card-header">
                        <h2>${kat.nama}</h2>
                    </div>
                    <div class="card-image-main">
                        <img src="${kat.gambar}" alt="${kat.nama}">
                    </div>
                    <button class="btn-action" onclick="jelajahi(${index})">Jelajahi</button>
                </div>
            `;
        });
    }

    function jelajahi(index) {
        const kategori = dataPerpustakaan[index];
        document.getElementById('halaman-utama').style.display = 'none';
        const listDiv = document.getElementById('halaman-list');
        listDiv.style.display = 'block';
        
        listDiv.innerHTML = `
            <button class="btn-back" onclick="kembali()">← Kembali</button>
            <div class="list-container">
                <div class="list-header">
                    <h2>Daftar ${kategori.nama}</h2>
                </div>
                <div style="padding: 10px 20px;">
                    ${kategori.buku.map(b => `
                        <div class="list-item">
                            <span>${b.judul}</span>
                            <a href="${b.link}" target="_blank" class="btn-download">Buka PDF</a>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function kembali() {
        document.getElementById('halaman-utama').style.display = 'grid';
        document.getElementById('halaman-list').style.display = 'none';
    }

    renderUtama();
</script>
</body>
</html>
