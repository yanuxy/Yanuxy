<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Yanuxy</title>
    <style>
        :root { --bg: #000000; --card-bg: #1a1a1a; --accent: #3498db; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 40px 20px; border-bottom: 1px solid #222; }

        /* GRID SISTEM */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }

        /* KOTAK KATEGORI & BUKU (3 BAGIAN) */
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
        .card-top { padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .card-mid img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .btn-blue { display: block; width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; text-decoration: none; text-align: center; }

        /* READER AREA (DIPERBAIKI) */
        #view-isi { display: none; background: #000; padding: 15px; }
        .reader-container { max-width: 700px; margin: auto; }
        .isi-konten { 
            color: #ccc; line-height: 1.7; font-size: 1rem; 
            white-space: pre-wrap; text-align: left; margin-top: 20px;
        }
        .btn-back { background: #222; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

<header><h1>Perpustakaan Yanuxy</h1></header>

<div class="container">
    <div id="view-utama" class="grid-layout"></div>
    <div id="view-kategori" style="display: none;">
        <button class="btn-back" onclick="showUtama()">← Kembali</button>
        <h2 id="judul-kat-aktif"></h2>
        <div id="grid-buku" class="grid-layout"></div>
    </div>
    <div id="view-isi">
        <div class="reader-container">
            <button class="btn-back" onclick="backToKategori()">← Kembali</button>
            <h1 id="judul-buku-baca" style="color: var(--accent); font-size: 1.5rem;"></h1>
            <div id="teks-buku" class="isi-konten"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
    function showUtama() {
        document.getElementById('view-utama').style.display = 'grid';
        document.getElementById('view-kategori').style.display = 'none';
        document.getElementById('view-isi').style.display = 'none';
        const grid = document.getElementById('view-utama');
        grid.innerHTML = '';
        dataPerpustakaan.forEach((d, i) => {
            grid.innerHTML += `<div class="card"><div class="card-top">${d.kategori}</div><div class="card-mid"><img src="${d.gambar}"></div><button class="btn-blue" onclick="showKategori(${i})">Jelajahi</button></div>`;
        });
    }

    function showKategori(idx) {
        const d = dataPerpustakaan[idx];
        document.getElementById('view-utama').style.display = 'none';
        document.getElementById('view-kategori').style.display = 'block';
        document.getElementById('judul-kat-aktif').innerText = d.kategori;
        const grid = document.getElementById('grid-buku');
        grid.innerHTML = '';
        d.buku.forEach((b, bi) => {
            grid.innerHTML += `<div class="card"><div class="card-mid"><img src="${b.sampul}"></div><div class="card-top">${b.judul}</div><button class="btn-blue" onclick="bacaBuku(${idx}, ${bi})">Buka</button></div>`;
        });
    }

    function bacaBuku(ki, bi) {
        const buku = dataPerpustakaan[ki].buku[bi];
        document.getElementById('view-kategori').style.display = 'none';
        document.getElementById('view-isi').style.display = 'block';
        document.getElementById('judul-buku-baca').innerText = buku.judul;
        document.getElementById('teks-buku').innerText = buku.isi;
        window.scrollTo(0,0);
    }

    function backToKategori() { document.getElementById('view-isi').style.display = 'none'; document.getElementById('view-kategori').style.display = 'block'; }
    function showUtamaBack() { showUtama(); }

    showUtama();
</script>
</body>
</html>
