<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Yanuxy</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1a1a1a;
            --accent: #3498db;
            --text: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 0; 
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        header { text-align: center; padding: 50px 20px; background: #0a0a0a; border-bottom: 1px solid #222; margin-bottom: 30px; }

        /* GRID UTAMA */
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        /* DESAIN KOTAK (UNTUK KATEGORI & BUKU) */
        .card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card-body { padding: 30px 20px; flex-grow: 1; text-align: center; }
        
        .card-tag { 
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase; 
            color: var(--accent); margin-bottom: 10px; display: block;
        }

        .card-title { font-size: 1.4rem; font-weight: bold; margin: 0; }

        /* TOMBOL FULL WIDTH */
        .btn-main {
            display: block; width: 100%; padding: 15px;
            background: var(--accent); color: white; border: none;
            font-weight: bold; text-decoration: none; cursor: pointer;
            font-size: 1rem; text-align: center;
        }

        .btn-back { 
            background: #222; color: white; border: 1px solid #444; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; 
        }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>Perpustakaan Yanuxy</h1>
    <p>Pilih Kategori untuk Melihat Koleksi</p>
</header>

<div class="container">
    <div id="view-kategori" class="grid-layout">
        </div>

    <div id="view-buku" style="display: none;">
        <button class="btn-back" onclick="showKategori()">← Kembali ke Kategori</button>
        <h2 id="nama-kategori-aktif" style="margin-bottom: 25px;"></h2>
        <div id="grid-buku" class="grid-layout">
            </div>
    </div>
</div>

<footer>© 2026 Yanuxy Novel</footer>

<script>
    const dataKoleksi = [
        { 
            kategori: "Novel", 
            items: [
                { judul: "Universal Wealth System", link: "#" },
                { judul: "Sang Penyihir Terakhir", link: "#" },
                { judul: "Pedang di Balik Senyum", link: "#" }
            ]
        },
        { 
            kategori: "Programming", 
            items: [
                { judul: "Modding Android BGA", link: "#" },
                { judul: "Web Dev Dasar", link: "#" }
            ]
        }
    ];

    function init() {
        const container = document.getElementById('view-kategori');
        container.innerHTML = '';
        dataKoleksi.forEach((item, index) => {
            container.innerHTML += `
                <div class="card">
                    <div class="card-body">
                        <span class="card-tag">Koleksi</span>
                        <h2 class="card-title">${item.kategori}</h2>
                    </div>
                    <button class="btn-main" onclick="showBuku(${index})">Jelajahi</button>
                </div>
            `;
        });
    }

    function showBuku(index) {
        const data = dataKoleksi[index];
        document.getElementById('view-kategori').style.display = 'none';
        document.getElementById('view-buku').style.display = 'block';
        document.getElementById('nama-kategori-aktif').innerText = "Kategori: " + data.kategori;

        const gridBuku = document.getElementById('grid-buku');
        gridBuku.innerHTML = '';
        
        data.items.forEach(buku => {
            gridBuku.innerHTML += `
                <div class="card">
                    <div class="card-body">
                        <span class="card-tag">${data.kategori}</span>
                        <h2 class="card-title">${buku.judul}</h2>
                    </div>
                    <a href="${buku.link}" class="btn-main">Baca Sekarang</a>
                </div>
            `;
        });
        window.scrollTo(0,0);
    }

    function showKategori() {
        document.getElementById('view-kategori').style.display = 'grid';
        document.getElementById('view-buku').style.display = 'none';
    }

    init();
</script>

</body>
</html>
